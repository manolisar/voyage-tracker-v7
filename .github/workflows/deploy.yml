# Build the Vite SPA and publish to GitHub Pages.
#
# Repo settings → Pages → Source: GitHub Actions.
# Optional repo variable: VITE_DATA_REPO  (e.g. "owner/voyage-tracker-data")
# Optional repo variable: VITE_DATA_BRANCH (defaults to "main")
#
# These are baked into the bundle at build time so the deployed app knows
# which data repo to talk to. The PAT itself never goes through CI — users
# paste it into the Admin modal at runtime.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_DATA_REPO:   ${{ vars.VITE_DATA_REPO }}
          VITE_DATA_BRANCH: ${{ vars.VITE_DATA_BRANCH }}
        run: npm run build

      # Publish dist/ as the Pages artifact.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
